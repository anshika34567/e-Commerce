<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💳 Checkout - eCommerce Website</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div id="header"></div>

    <div class="container mt-5">
        <h2>Checkout</h2>
        <!-- Cart Summary -->
        <h4 class="mt-4">Order Summary</h4>
        <table class="table mb-4">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Qty</th>
                    <th>Price</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="checkout-cart-items">
                <!-- Cart summary will be loaded here -->
            </tbody>
            <tfoot>
                <tr>
                    <th colspan="3" class="text-end">Grand Total:</th>
                    <th id="checkout-grand-total">$0.00</th>
                </tr>
            </tfoot>
        </table>
        <!-- Checkout Form -->
        <form id="checkout-form" class="needs-validation" novalidate>
            <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name" required>
                <div class="invalid-feedback">Please enter your full name.</div>
            </div>
            <div class="mb-3">
                <label for="address" class="form-label">Shipping Address</label>
                <input type="text" class="form-control" id="address" required>
                <div class="invalid-feedback">Please enter your shipping address.</div>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" required>
                <div class="invalid-feedback">Please enter a valid email address.</div>
            </div>
            <div class="mb-3">
                <label for="card" class="form-label">Credit Card Number</label>
                <input type="text" class="form-control" id="card" required pattern="\d{16}">
                <div class="invalid-feedback">Please enter a valid 16-digit card number.</div>
            </div>
            <div class="mb-3">
                <label for="expiry" class="form-label">Expiry Date</label>
                <input type="text" class="form-control" id="expiry" placeholder="MM/YY" required pattern="^(0[1-9]|1[0-2])\/\d{2}$">
                <div class="invalid-feedback">Please enter expiry as MM/YY.</div>
            </div>
            <div class="mb-3">
                <label for="cvv" class="form-label">CVV</label>
                <input type="password" class="form-control" id="cvv" required pattern="\d{3,4}">
                <div class="invalid-feedback">Please enter a valid CVV.</div>
            </div>
            <button type="submit" class="btn btn-primary">Complete Purchase</button>
        </form>
    </div>

    <div id="footer"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Example products array (should match your main.js)
        const products = [
            { id: 1, name: "Wireless Headphones", price: 49.99, image: "wireless headphone.jpeg" },
            { id: 2, name: "Smart Watch", price: 89.99, image: "smart wattch.jpeg" },
            { id: 3, name: "Bluetooth Speaker", price: 29.99, image: "b_speaker.jpeg" },
            { id: 4, name: "VR Headset", price: 99.99, image: "vr headsettt.jpeg" }
        ];

        function getCart() {
            return JSON.parse(localStorage.getItem('cart')) || [];
        }
        function updateCartCount() {
            const cart = getCart();
            const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
            $("#cart-count").text(count);
        }
        function loadCheckoutCartSummary() {
            let cart = getCart();
            let total = 0;
            $("#checkout-cart-items").empty();
            if (cart.length === 0) {
                $("#checkout-cart-items").append('<tr><td colspan="4">Your cart is empty.</td></tr>');
            } else {
                cart.forEach(cartItem => {
                    let product = products.find(p => p.id === cartItem.id);
                    if (product) {
                        let itemTotal = product.price * cartItem.quantity;
                        total += itemTotal;
                        $("#checkout-cart-items").append(`
                            <tr>
                                <td>${product.name}</td>
                                <td>${cartItem.quantity}</td>
                                <td>$${product.price.toFixed(2)}</td>
                                <td>$${itemTotal.toFixed(2)}</td>
                            </tr>
                        `);
                    }
                });
            }
            $("#checkout-grand-total").text(`$${total.toFixed(2)}`);
        }
        $(document).ready(function() {
    $("#header").load("../components/header.html", function() {
        updateCartCount();
    });
    $("#footer").load("../components/footer.html");
    loadCheckoutCartSummary();

    // Bootstrap validation
    $("#checkout-form").on("submit", function(e) {
        if (!this.checkValidity()) {
            e.preventDefault();
            e.stopPropagation();
            $(this).addClass('was-validated');
            return;
        }
        e.preventDefault();
        alert("Thank you for your purchase! (Demo only)");
        localStorage.removeItem('cart');
        updateCartCount();
        window.location.href = "index.html";
    });

    // Disable submit if cart is empty
    if (getCart().length === 0) {
        $("#checkout-form button[type='submit']").prop("disabled", true);
    }
});
</script>
</body>
</html>
