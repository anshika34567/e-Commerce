<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛒 Shopping Cart</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div id="header"></div>

    <div class="container mt-5">
        <h2>Your Shopping Cart</h2>
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Total</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="cart-items">
                    <!-- Cart items will be dynamically inserted here -->
                </tbody>
            </table>
        </div>
        <div class="d-flex justify-content-between">
            <h4 id="total-price">Total: $0.00</h4>
            <a href="checkout.html" class="btn btn-primary" id="checkout-btn">Proceed to Checkout</a>
        </div>
    </div>

    <div id="footer"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    const products = [
        { id: 1, name: "Wireless Headphones", price: 49.99, image: "../img/wireless headphone.jpeg" },
        { id: 2, name: "Smart Watch", price: 89.99, image: "../img/smart wattch.jpeg" },
        { id: 3, name: "Bluetooth Speaker", price: 29.99, image: "../img/b_speaker.jpeg" },
        { id: 4, name: "VR Headset", price: 99.99, image: "../img/vr headsettt.jpeg" }
    ];

    function getCart() {
        return JSON.parse(localStorage.getItem('cart')) || [];
    }

    function saveCart(cart) {
        localStorage.setItem('cart', JSON.stringify(cart));
    }

    function updateCartCount() {
        const cart = getCart();
        const count = cart.reduce((sum, item) => sum + item.quantity, 0);
        $("#cart-count").text(count);
    }

    function loadCartItems() {
        let cart = getCart();
        let total = 0;
        $("#cart-items").empty();
        if (cart.length === 0) {
            $("#cart-items").append('<tr><td colspan="5">Your cart is empty.</td></tr>');
            $("#checkout-btn").prop("disabled", true);
        } else {
            cart.forEach(cartItem => {
                let product = products.find(p => p.id === cartItem.id);
                if (product) {
                    let itemTotal = product.price * cartItem.quantity;
                    total += itemTotal;
                    $("#cart-items").append(`
                        <tr>
                            <td>
                                <img src="${product.image}" alt="${product.name}" style="width:60px;height:40px;object-fit:cover;margin-right:10px;" onerror="this.src='../img/placeholder.png'">
                                ${product.name}
                            </td>
                            <td>${cartItem.quantity}</td>
                            <td>$${product.price.toFixed(2)}</td>
                            <td>$${itemTotal.toFixed(2)}</td>
                            <td>
                                <button class="btn btn-danger remove-item" data-id="${product.id}" aria-label="Remove ${product.name} from cart">Remove</button>
                            </td>
                        </tr>
                    `);
                }
            });
            $("#checkout-btn").prop("disabled", false);
        }
        $("#total-price").text(`Total: $${total.toFixed(2)}`);
    }

    $(document).ready(function() {
        // Load header/footer components
        $("#header").load("../components/header.html");
        $("#footer").load("../components/footer.html");

        updateCartCount();
        loadCartItems();

        $(document).on('click', '.remove-item', function() {
            let id = $(this).data('id');
            let cart = getCart();
            cart = cart.filter(item => item.id !== id);
            saveCart(cart);
            updateCartCount();
            loadCartItems();
        });

        $("#checkout-btn").click(function(e) {
            if ($(this).prop("disabled")) return false;
            alert("Thank you for your purchase! (Demo only)");
            // Optionally clear the cart:
            // localStorage.removeItem('cart');
            // updateCartCount();
            // loadCartItems();
        });
    });
    </script>
</body>
</html>
